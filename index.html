<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Space tourism website</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&family=Barlow+Condensed:wght@400;700&family=Bellefair&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>

  <header class="primary-header flex">
    <div>
      <img src="./assets/shared/logo.svg" alt="Space tourism logo" class="logo">
    </div>
    <button class="mobile-nav-toggle" aria-controls="primary-navigation" aria-expanded="false"><span class="sr-only">Menu</span></button>
    <nav>
      <ul id="primary-navigation" data-visible="false" class="primary-navigation underline-indicators flex">
        <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="#" data-route="home"><span aria-hidden="true">00</span>Home</a></li>
        <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="#" data-route="destination"><span aria-hidden="true">01</span>Destination</a></li>
        <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="#" data-route="crew"><span aria-hidden="true">02</span>Crew</a></li>
        <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="#" data-route="technology"><span aria-hidden="true">03</span>Technology</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" class="main-content"></main>

  <script src="./main.js" type="module"></script>
</body>
</html>
